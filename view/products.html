<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css">

</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="header">
        <div class="header-top">
            <h1> Lista de Productos</h1>
            <button id="btnAddProduct" onclick="showAddProduct()">+ Add Product</button>
        </div>

        <div class="search-box">
            <input 
                id="idFilter" 
                type="text" 
                placeholder="Buscar por ID..." 
                oninput="getFindByIdProduct()"
            >
        </div>
    </div>

    
    <div id="container"></div>

</div>

<!-- UPDATE PRODUCT -->
<section id="update" style="display:none">

<div class="container">

<h1>Update product</h1>

<input type="hidden" id="idUpdate">

<label class="form-label">Title</label>
<input type="text" class="form-control" id="title">

<label class="form-label">Price</label>
<input type="number" class="form-control" id="price">

<label class="form-label">Imagen</label>
<input type="file" class="form-control" id="image" accept="image/*">

<br>

<button class="btn btn-success" onclick="updateProduct()">Save</button><br><br>

<button class="btn btn-secondary" onclick="showTable()">Cancel</button>

</div>

</section>

<!-- ADD PRODUCT -->
<section id="addProduct" style="display:none">

<div class="container">

<h1>Add Product</h1>

<label class="form-label">Title</label>
<input type="text" class="form-control" id="titleAdd" placeholder="Producto">

<label class="form-label">Price</label>
<input type="number" class="form-control" id="priceAdd" placeholder="Precio">

<label class="form-label">Imagen</label>
<input type="file" class="form-control" id="imageAdd" accept="image/*">

<br>

<button class="btn btn-success" onclick="addProduct()">Save</button>

<button class="btn btn-secondary" onclick="showTable()">Cancel</button>

</div>

</section>

<script type="module" src="../js/main.js"></script>
<script type="module" src="../js/mainUser.js"></script>
</body>
</html>
